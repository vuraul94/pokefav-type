<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Pokémon Favoritos por Tipo</title>
</head>
<body>
    <div id="app">
        <header>
            <h1>Selector de Pokémon Favoritos</h1>
            <p>Haz clic en una celda para elegir tu Pokémon. Haz clic en un Pokémon ya elegido para cambiar entre normal y shiny.</p>
            <button id="export-btn">Exportar como Imagen</button>
        </header>

        <main id="grid-container"></main>

        <section class="extra-selections">
            <h2>Creador de Equipo</h2>
            <div id="team-builder-container" class="slots-container"></div>
        </section>

        <section class="extra-selections">
            <h2>Favorito General</h2>
            <div id="overall-favorite-container" class="slots-container"></div>
        </section>
        
        <section class="extra-selections">
            <h2>Favoritos por Generación</h2>
            <div id="gen-favorites-container" class="slots-container"></div>
        </section>
    </div>

    <div id="selection-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="close-modal-btn">&times;</button>
            </div>
            <div id="modal-pokemon-list"></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
