<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="pageTitle">Pokémon Favorite Type Selector</title>
    <link rel="icon" type="image/png" href="/loveball.png">
</head>
<body>
    <div id="app">
        <header>
            <h1 data-i18n-key="headerTitle">Favorite Pokémon Selector</h1>
            <p data-i18n-key="headerSubtitle">Click a cell to choose your favorite Pokémon. Click an already chosen Pokémon to toggle between normal and shiny.</p>
            <div class="controls-container">
                <button id="export-btn" data-i18n-key="exportButton">Export as Image</button>
                <button id="export-selection-btn" data-i18n-key="exportSelectionButton">Export Selection</button>
                <label class="button-like-label" for="import-selection-input" data-i18n-key="importSelectionButton">Import Selection</label>
                <input type="file" id="import-selection-input" accept=".json" style="display: none;">
                <div id="lang-switcher">
                    <button data-lang="en">EN</button>
                    <button data-lang="es">ES</button>
                </div>
            </div>
        </header>

        <div id="export-area">
            <main id="grid-container"></main>

            <section class="extra-selections">
                <h2 data-i18n-key="genFavoritesTitle">Favorites by Generation</h2>
                <div id="gen-favorites-container" class="slots-container"></div>
            </section>

            <section class="extra-selections">
                <h2 data-i18n-key="starterFavoritesTitle">Favorite Starter</h2>
                <div id="starter-favorites-container" class="slots-container"></div>
            </section>

            <section class="extra-selections">
                <h2 data-i18n-key="teamBuilderTitle">Team Builder</h2>
                <div id="team-builder-container" class="slots-container"></div>
            </section>

            <section class="extra-selections">
                <h2 data-i18n-key="overallFavoriteTitle">Overall Favorite</h2>
                <div id="overall-favorite-container" class="slots-container"></div>
            </section>

            <section class="extra-selections" id="gen-percentages-section">
                <h2 data-i18n-key="genPercentagesTitle">Favorites % by Generation</h2>
                <div id="gen-percentages-container" class="percentages-container"></div>
            </section>
        </div>
    </div>

    <div id="selection-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" data-i18n-key="modalSelectTitle">Select Pokémon</h2>
                <button id="close-modal-btn">&times;</button>
            </div>
            <div id="modal-pokemon-list"></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
